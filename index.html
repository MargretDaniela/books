<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Managment system</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <nav>
        <div>
            <nav class="navbar navbar-light bg-light">
                <b><a class="navbar-brand" style="align-items: center; font-size: 250%;margin-left: 100px;">BOOK MANAGEMENT SYSTEM</a></b>
                <form class="form-inline" style="display: flex; align-items: center;">
                  <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass"></i> 
                    <input class="search-input " style="margin-right: 170px;"
                  type="search" placeholder="Search by title or author" aria-label="Search">
                  </div>
                  <div>
                    <button class="btn btn-outline-success my-2 my-sm-0" 
                        style="padding: 6px 12px; font-size: 16px; white-space: nowrap; margin-right: 50px;" 
                        type="submit">
                        + Add Book
                    </button>
                </div>
            
                </form>
              </nav>
        </div>
    </nav>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./index.js"></script>
</body>
</html>
